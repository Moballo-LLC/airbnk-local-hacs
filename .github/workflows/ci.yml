name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy custom_components/airbnk_ble
      - name: Test
        run: pytest
